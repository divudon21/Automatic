name: VibeFlow — Build & Release APK

# ─── Trigger ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # runs on every push to main
  workflow_dispatch:  # also allows manual trigger from GitHub Actions tab

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to create GitHub Releases & upload assets

# ─── Job ──────────────────────────────────────────────────────────────────────
jobs:
  build-and-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout source code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for proper versioning

      # 2. Set up JDK 17 (required by AGP 8.x + Kotlin 2.x)
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin (formerly AdoptOpenJDK)
          cache: gradle             # cache ~/.gradle to speed up builds

      # 3. Set up Android SDK (pre-installed on ubuntu-latest, just configure)
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Cache Gradle dependencies (speeds up subsequent builds)
      - name: 🗄️ Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Make gradlew executable
      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      # 6. Accept Android SDK licenses
      - name: ✅ Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # 7. Build Release APK
      #    Release buildType uses debug signingConfig (see app/build.gradle.kts)
      #    so the APK is signed and directly installable — no keystore secrets needed.
      - name: 🔨 Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      # 8. Rename APK with version info for clean release asset name
      - name: 📦 Rename APK
        id: rename_apk
        run: |
          # Get versionName from gradle output
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0")
          TIMESTAMP=$(date +'%Y%m%d-%H%M')
          APK_NAME="VibeFlow-v${VERSION}-${TIMESTAMP}.apk"

          # Find the built APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          # Copy with new name to workspace root for easy upload
          cp "$APK_PATH" "$APK_NAME"

          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_path=$APK_PATH"  >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "✅ APK ready: $APK_NAME"

      # 9. Upload APK as workflow artifact (available in Actions tab even without release)
      - name: ⬆️ Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: VibeFlow-APK
          path: ${{ steps.rename_apk.outputs.apk_name }}
          retention-days: 30

      # 10. Create GitHub Release and upload APK
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rename_apk.outputs.version }}-${{ github.run_number }}
          name: "VibeFlow v${{ steps.rename_apk.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ## 🎵 VibeFlow — Auto Release

            **Build:** #${{ github.run_number }}
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** ${{ github.actor }}

            ---

            ### 📲 How to Install
            1. Download `${{ steps.rename_apk.outputs.apk_name }}` below
            2. On your Android device: **Settings → Security → Unknown Sources** ✅
            3. Open the downloaded APK and tap **Install**

            ### ✨ Features
            - 🎵 JioSaavn streaming (Hindi / Bollywood)
            - 📻 YouTube Music (Bollywood, Phonk, International)
            - 🔔 Background playback with notification controls
            - 📥 Download songs (Low / Medium / High quality)
            - 🎨 Spotify-like full-screen player with vinyl animation

            > ⚠️ This APK is signed with a debug key — safe to install directly.
          files: ${{ steps.rename_apk.outputs.apk_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
