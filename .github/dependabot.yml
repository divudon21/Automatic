version: 2
updates:
  # ── Android / Gradle dependencies ─────────────────────────────────────────
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
    groups:
      # Group all Media3 updates together
      media3:
        patterns:
          - "androidx.media3*"
      # Group all Compose updates
      compose:
        patterns:
          - "androidx.compose*"
      # Group OkHttp / Retrofit
      networking:
        patterns:
          - "com.squareup.okhttp3*"
          - "com.squareup.retrofit2*"
    ignore:
      # Don't auto-bump Kotlin / AGP — these need manual testing
      - dependency-name: "org.jetbrains.kotlin*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.android.tools.build*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "github-actions"
